    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #121212; /* Dark background */
            color: #dcdcdc; /* Light grey text */
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            min-height: 100vh;
        }

        /* Container Layout */
        .container {
            width: 100%;
            min-height: 100vh;
        }

        /* --- Left Sidebar --- */
        .sidebar {
            position: fixed;
            width: 200px;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100vh;
            transition: opacity 0.1s ease-out; 
        }

        /* Navigation */
        .nav-menu {
            list-style: none;
            margin-bottom: 40px;
            position: relative;
        }

        .nav-menu li {
            margin-bottom: 15px;
            font-size: 20px;
            letter-spacing: 1px;
            position: relative;
        }

        .nav-menu a {
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
            display: block;
            padding: 5px 0;
            position: relative;
        }

        .nav-menu a:hover {
            color: #fff;
        }

        .nav-menu .active a {
            color: #fff;
        }

        /* Individual Sliding Underline for Each Nav Item */
        .nav-menu li::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: #555;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .nav-menu li.active::after {
            transform: scaleX(1);
        }

        /* Page Transition Styles - Only for main content */
        .main-content-transition {
            opacity: 0;
            transform: translateY(100px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .main-content-transition.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* Social Icons */
        .social-icons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: auto;
        }

        .social-icons a {
            color: #dcdcdc;
            font-size: 20px;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-icons a:hover {
            color: #fff;
        }

        /* --- Main Content Area --- */
        .main-content {
            margin-left: 280px;
            padding: 60px 80px 60px 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Hero Section (Name) */
        .hero {
            margin-top: 40px;
            margin-bottom: 60px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 60px; 
        }

        .hero-text {
            flex: 1;
        }

        .hero h1 {
            font-size: 80px;
            font-weight: 100;
            line-height: 1.1;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 15px;
        }

        .hero h2 {
            font-size: 14px;
            font-weight: 300;
            color: #aaa;
            letter-spacing: 0.5px;
            margin-bottom: 20%;
        }

        /* Bottom Content Area (Contact & About) */
        .bottom-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 20px;
        }

        .contact-info {
            font-size: 20px;
            color: #aaa;
            line-height: 1.6;
        }

        /* Image Section */
        .image {
            width: 500px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .image:hover {
            transform: translateY(-5px);
        }

        .image img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .projects-wrapper {
            margin-top: 0px;
        }

        .gallery-header {
            max-width: 780px;
            margin-bottom: 0px;
        }

        .gallery-header .eyebrow {
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
            margin-bottom: 0px;
            font-size: 14px;
        }

        .gallery-header h1 {
            font-size: 60px;
            line-height: 1.05;
            color: #fff;
            margin-bottom: 0px;
            font-weight: 100;
        }

        .gallery-header p {
            font-size: 18px;
            color: #bbb;
            line-height: 1.8;
            max-width: 100%;
        }

        .carousel {
            position: relative;
            overflow: hidden;
            background: #ffffff;
            border: 0px solid rgba(255, 255, 255, 1);
            margin-top: 24px;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .carousel.visible {
            opacity: 1;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.55s ease;
            width: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            height: 680px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000000;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .carousel-button {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: rgba(255, 255, 255, 0);
            color: #f5f5f5;
            width: 56px;
            height: 56px;
            cursor: pointer;
            z-index: 10;
            font-size: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s ease;
        }

        .carousel-button:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .carousel-button.prev {
            left: 18px;
        }

        .carousel-button.next {
            right: 18px;
        }


        @media (max-width: 768px) {
            .carousel-slide {
                height: 420px;
            }
        }

        /* About Me Body Section */
        .about-me-body {
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            padding: 60px 80px 60px 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .about-me-body h1 {
            text-align: center;
            font-size: 80px;
            font-weight: 100;
            line-height: 1.1;
            letter-spacing: 2px;
            color: #fff;
            margin-bottom: 15px;
            transition: color 0.3s;
        }

        .about-me-body.visible {
            opacity: 1;
        }

        /* --- CSS Toggle Switch --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            align-self: center; 
            margin-bottom: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333; 
            -webkit-transition: .4s;
            transition: .4s;
            border: 1px solid #555; 
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 4px;
            bottom: 4px;
            background-color: #dcdcdc;
            -webkit-transition: .4s;
            transition: .4s;
        }

        input:checked + .slider {
            background-color: #e0e1e4; 
        }

        input:focus + .slider {
            box-shadow: 0 0 1px #e0e1e4;
        }

        input:checked + .slider:before {
            -webkit-transform: translateX(26px);
            -ms-transform: translateX(26px);
            transform: translateX(26px);
            background-color: #121212; 
        }

        .slider.round {
            border-radius: 34px;
        }

        .slider.round:before {
            border-radius: 50%;
        }

        /* --- Toggle Content Container (Side-by-Side Flexbox) --- */
        .toggle-content {
            transition: background-color 0.5s ease, color 0.5s ease;
            padding: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center; 
            justify-content: center;
            gap: 60px; /* Increased gap for better spacing between image and text */
        }

        /* State 1: Normal (Dark) */
        .toggle-content.state-1 {
            background-color: #121212;
            color: #dcdcdc;
        }

        /* State 2: White Background */
        .toggle-content.state-2 {
            background-color: #e0e1e4;
            color: #121212;
        }

        /* FIXED: Profile Picture Sizing */
        .profile-picture {
            flex-shrink: 0;
            width: 300px; /* Base size of the image container */
            height: 300px; /* Force perfect square */
            border-radius: 50%; /* Make container round */
            overflow: hidden; /* Ensure image stays inside the circle */
            transition: transform 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .profile-picture:hover {
            transform: translateY(-5px);
        }

        .profile-picture img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image fills the circle perfectly without stretching */
            display: block;
        }

        .toggle-text {
            display: flex;
            flex-direction: column;
            gap: 20px; 
            max-width: 500px; /* Prevents text from stretching too far wide */
        }

        .toggle-text p {
            font-size: 22px; /* Slightly reduced from 25px so it balances nicely with the 300px image */
            line-height: 1.6;
            margin: 0; 
        }

        /* --- Mobile Responsiveness --- */
        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
                padding: 20px;
                flex-direction: row;
                align-items: center;
            }
            .nav-menu {
                display: flex;
                gap: 15px;
                margin-bottom: 0;
            }
            .social-icons {
                flex-direction: row;
            }
            .main-content {
                margin-left: 0;
                padding: 20px;
            }
            .hero {
                flex-direction: column;
                text-align: center;
                gap: 30px;
            }
            .image {
                width: 100%;
            }
            .about-me-body {
                padding: 20px;
                height: 70px;
            }
            .hero h1, .about-me-body h1 {
                font-size: 50px;
            }
            
            /* Stack the profile picture and text on mobile */
            .toggle-content {
                flex-direction: column;
                text-align: center;
                gap: 30px;
                padding: 20px;
            }
            .profile-picture {
                width: 200px; /* Scale image down slightly on mobile */
                height: 200px;
            }
            .toggle-text p {
                font-size: 18px; /* Scale text down on mobile */
            }

            .carousel-slide {
                height: 400px;
            }
        }
        
    </style>
</head>

    <script>
        const mainContent = document.querySelector('.main-content');
        const sidebar = document.querySelector('.sidebar');
        const navMenu = document.querySelector('.nav-menu');
        const navLinks = document.querySelectorAll('.nav-menu a');

        // Page transition functionality - Only affects main content
        function fadeOutPage() {
            const mainContent = document.querySelector('.main-content');
            mainContent.classList.add('main-content-transition');
            mainContent.classList.remove('active');
        }

        function fadeInPage() {
            const mainContent = document.querySelector('.main-content');
            setTimeout(() => {
                mainContent.classList.add('active');
            }, 50);
        }

        // Navigation click handler with transitions
        navLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                if (!this.classList.contains('active')) {
                    e.preventDefault();
                    fadeOutPage();
                    
                    setTimeout(() => {
                        window.location.href = this.href;
                    }, 300);
                }
            });
        });

        // Initialize page fade-in on load
        window.addEventListener('load', function() {
            fadeInPage();
        });

        // Update active navigation state and sliding underline
        function updateActiveNav() {
            const currentPath = window.location.pathname.split('/').pop();
            const navItems = document.querySelectorAll('.nav-menu li');
            
            navItems.forEach(item => {
                const link = item.querySelector('a');
                const linkPath = link.getAttribute('href').split('/').pop();
                if (linkPath === currentPath) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // Sidebar scroll fade effect
        window.addEventListener('scroll', function() {
            const scrollTop = window.scrollY;
            let fadeDistance = mainContent.offsetHeight - window.innerHeight;
            
            if (fadeDistance <= 0) {
                fadeDistance = 500; 
            }

            const opacity = Math.max(0, 1 - (scrollTop / fadeDistance));
            sidebar.style.opacity = opacity;
        });

        const aboutMeBody = document.querySelector('.about-me-body');

        // About me body fade in/out on scroll
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                } else {
                    entry.target.classList.remove('visible');
                }
            });
        }, observerOptions);

        if (aboutMeBody) {
            observer.observe(aboutMeBody);
        }

        // Initialize navigation on page load
        updateActiveNav();


        // ==========================================
        // FIX APPLIED HERE: Re-written to loop through 
        // ALL carousels independently.
        // ==========================================
        const allCarousels = document.querySelectorAll('.carousel');

        allCarousels.forEach(carousel => {
            const track = carousel.querySelector('.carousel-track');
            const slides = Array.from(carousel.querySelectorAll('.carousel-slide'));
            const prevButton = carousel.querySelector('.carousel-button.prev');
            const nextButton = carousel.querySelector('.carousel-button.next');

            let currentIndex = 0;

            function updateCarousel() {
                if (!track) return;
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
            }

            function showPrevious() {
                currentIndex = (currentIndex - 1 + slides.length) % slides.length;
                updateCarousel();
            }

            function showNext() {
                currentIndex = (currentIndex + 1) % slides.length;
                updateCarousel();
            }

            if (track && slides.length > 0) {
                prevButton?.addEventListener('click', showPrevious);
                nextButton?.addEventListener('click', showNext);
            }
        });

        // Global keydown event to control both/all carousels (optional, but handy)
        window.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowLeft') {
                document.querySelectorAll('.carousel-button.prev').forEach(btn => btn.click());
            }
            if (event.key === 'ArrowRight') {
                document.querySelectorAll('.carousel-button.next').forEach(btn => btn.click());
            }
        });

        // Carousel fade-in on scroll
        const carouselElements = document.querySelectorAll('.carousel');
        const carouselObserverOptions = {
            threshold: 0.1
        };

        const carouselFadeObserver = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                } else {
                    entry.target.classList.remove('visible');
                }
            });
        }, carouselObserverOptions);

        carouselElements.forEach(carousel => {
            carouselFadeObserver.observe(carousel);
        });

    </script>
</body>
</html>
